<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>UTD Chat Assistant</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --background: 0 0% 100%;
      --foreground: 222.2 47.4% 11.2%;
      --card: 0 0% 100%;
      --card-foreground: 222.2 47.4% 11.2%;
      --popover: 0 0% 100%;
      --popover-foreground: 222.2 47.4% 11.2%;
      --primary: 24 95% 44%;
      --primary-foreground: 0 0% 98%;
      --secondary: 210 40% 96.1%;
      --secondary-foreground: 222.2 47.4% 11.2%;
      --muted: 210 40% 96.1%;
      --muted-foreground: 215.4 16.3% 46.9%;
      --accent: 210 40% 96.1%;
      --accent-foreground: 222.2 47.4% 11.2%;
      --destructive: 0 84.2% 60.2%;
      --destructive-foreground: 210 40% 98%;
      --border: 214.3 31.8% 91.4%;
      --input: 214.3 31.8% 91.4%;
      --ring: 24 95% 44%;
    }

    body.dark {
      --background: 222.2 84% 4.9%;
      --foreground: 210 40% 98%;
      --card: 222.2 84% 4.9%;
      --card-foreground: 210 40% 98%;
      --popover: 222.2 84% 4.9%;
      --popover-foreground: 210 40% 98%;
      --primary: 24 95% 44%;
      --primary-foreground: 0 0% 98%;
      --secondary: 217.2 32.6% 17.5%;
      --secondary-foreground: 210 40% 98%;
      --muted: 217.2 32.6% 17.5%;
      --muted-foreground: 215 20.2% 65.1%;
      --accent: 217.2 32.6% 17.5%;
      --accent-foreground: 210 40% 98%;
      --destructive: 0 62.8% 30.6%;
      --destructive-foreground: 210 40% 98%;
      --border: 217.2 32.6% 17.5%;
      --input: 217.2 32.6% 17.5%;
      --ring: 24 95% 44%;
    }

    body {
      background-color: hsl(var(--background));
      color: hsl(var(--foreground));
      font-family: "Inter", "Helvetica", sans-serif;
    }

    .bg-background { background-color: hsl(var(--background)); }
    .text-foreground { color: hsl(var(--foreground)); }
    .bg-card { background-color: hsl(var(--card)); }
    .text-card-foreground { color: hsl(var(--card-foreground)); }
    .border-border { border-color: hsl(var(--border)); }
    .text-muted-foreground { color: hsl(var(--muted-foreground)); }
    .bg-primary { background-color: hsl(var(--primary)); }
    .text-primary-foreground { color: hsl(var(--primary-foreground)); }
    .focus\:ring-ring:focus { --tw-ring-color: hsl(var(--ring)); }

    #chat {
      scrollbar-width: thin;
    }

    .message {
      max-width: 70%;
      padding: 12px 16px;
      border-radius: 12px;
      position: relative;
      line-height: 1.5;
      word-wrap: break-word;
    }

    .message.user {
      margin-left: auto;
      background-color: hsl(var(--primary));
      color: hsl(var(--primary-foreground));
    }

    .message.bot {
      background-color: hsl(var(--card));
      color: hsl(var(--card-foreground));
      border: 1px solid hsl(var(--border));
    }

    .message .timestamp {
      position: absolute;
      bottom: -18px;
      right: 12px;
      font-size: 0.75rem;
      color: hsl(var(--muted-foreground));
    }
  </style>
</head>
<body class="min-h-screen bg-background text-foreground">
  <div class="flex h-screen flex-col">
    <header class="border-b border-border bg-background/95 px-6 py-4">
      <div class="flex items-center gap-4">
        <div class="flex h-10 w-10 items-center justify-center rounded-lg bg-primary text-primary-foreground">💬</div>
        <div>
          <h1 class="text-lg font-semibold">UTD Chat Assistant</h1>
          <p class="text-sm text-muted-foreground">University of Texas at Dallas</p>
        </div>
        <button class="ml-auto inline-flex h-9 w-9 items-center justify-center rounded-md border border-border bg-card text-card-foreground shadow-sm" id="dark-toggle" title="Toggle dark mode">🌙</button>
      </div>
    </header>

    <main class="flex-1 overflow-hidden">
      <div id="chat" class="flex h-full flex-col gap-6 overflow-y-auto px-6 py-6"></div>
    </main>

    <div class="border-t border-border bg-background px-6 py-4">
      <div class="flex items-center gap-3">
        <button class="inline-flex h-10 w-10 items-center justify-center rounded-md border border-border bg-card text-muted-foreground hover:text-foreground" title="Attach file">📎</button>
        <button class="inline-flex h-10 w-10 items-center justify-center rounded-md border border-border bg-card text-muted-foreground hover:text-foreground" title="Emoji">😊</button>
        <input id="message-input" class="flex-1 rounded-md border border-border bg-background px-3 py-2 text-sm shadow-sm focus:outline-none focus:ring-2 focus:ring-ring" placeholder="Type your message to UTD Chat Assistant..." />
        <button class="inline-flex h-10 w-10 items-center justify-center rounded-md bg-primary text-primary-foreground shadow hover:opacity-90" id="send-btn" title="Send message">➤</button>
      </div>
    </div>
  </div>

  <script>
    const chat = document.getElementById('chat');
    const input = document.getElementById('message-input');
    const sendBtn = document.getElementById('send-btn');
    const darkToggle = document.getElementById('dark-toggle');

    function appendMessage(text, role) {
      const msg = document.createElement('div');
      msg.className = 'message ' + role;
      msg.innerText = text;

      const ts = document.createElement('div');
      ts.className = 'timestamp';
      const now = new Date();
      ts.innerText = now.toLocaleTimeString([], {hour:'2-digit',minute:'2-digit'});
      msg.appendChild(ts);

      chat.appendChild(msg);
      chat.scrollTop = chat.scrollHeight;
    }

    function setDarkMode(enabled) {
      document.body.classList.toggle('dark', enabled);
      darkToggle.innerText = enabled ? '☀️' : '🌙';
    }

    const storedTheme = localStorage.getItem('theme');
    const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    const shouldUseDark = storedTheme === 'dark' || (!storedTheme && prefersDark);
    setDarkMode(shouldUseDark);

    darkToggle.addEventListener('click', () => {
      const isDark = document.body.classList.contains('dark');
      const nextMode = !isDark;
      setDarkMode(nextMode);
      localStorage.setItem('theme', nextMode ? 'dark' : 'light');
    });

    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;
      appendMessage(text, 'user');
      input.value = '';
      const res = await fetch('/ask', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({ question: text })
      });
      const data = await res.json();
      appendMessage(data.answer, 'bot');
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') sendMessage();
    });

    appendMessage("Hello! Welcome to UTD Chat Assistant. I'm here to help you with information about the University of Texas at Dallas. How can I assist you today?", 'bot');
  </script>
</body>
</html>
